name: Deploy docs preview

# Runs after "Build docs" completes. Using workflow_run means this job runs in
# the context of the base repository (not the PR fork), so it has the write
# access needed to publish to the gh-pages branch, while the build that ran the
# untrusted PR code had only a read-only token.

on:
  workflow_run:
    workflows: ["Build docs"]
    types:
      - completed

# Serialise with the cleanup workflow so concurrent pushes to gh-pages from
# different PRs cannot reject each other.
concurrency:
  group: gh-pages-deploy

permissions:
  contents: write       # push the preview to gh-pages
  pull-requests: write  # comment the preview link on the PR
  actions: read         # download the artifact from the triggering run

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
    - name: Download docs artifact
      uses: actions/download-artifact@v4
      with:
        name: docs-html
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path: artifact
    - name: Read PR number
      id: pr
      run: echo "number=$(cat artifact/pr-number.txt)" >> "$GITHUB_OUTPUT"
    - name: Publish preview to gh-pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: artifact/docs/build/html
        destination_dir: pr-${{ steps.pr.outputs.number }}
        keep_files: true  # preserve previews belonging to other PRs
    - name: Comment preview link
      uses: actions/github-script@v9
      with:
        script: |
          const n = Number('${{ steps.pr.outputs.number }}');
          const { owner, repo } = context.repo;
          const url = `https://${owner}.github.io/${repo}/pr-${n}/`;
          const marker = '<!-- docs-preview -->';
          const body = `${marker}\n📖 Documentation preview for this PR: ${url}`;
          const { data: comments } = await github.rest.issues.listComments({
            owner, repo, issue_number: n,
          });
          const existing = comments.find(c => c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner, repo, comment_id: existing.id, body,
            });
          } else {
            await github.rest.issues.createComment({
              owner, repo, issue_number: n, body,
            });
          }
