name: Validate new board definitions

on:
  pull_request:
    paths:
      - 'ports/*/boards/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-boards:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install uv
        uv pip install --system jsonschema

    - name: Get changed files
      id: changed
      run: |
        FILES=$(git diff --name-only \
          ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} \
          -- 'ports/*/boards/**' | tr '\n' ' ')
        echo "files=$FILES" >> "$GITHUB_OUTPUT"
        if [ -z "$FILES" ]; then
          echo "has_files=false" >> "$GITHUB_OUTPUT"
        else
          echo "has_files=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Validate new boards
      if: steps.changed.outputs.has_files == 'true'
      run: |
        python tools/validate_board.py \
          --repo-root . \
          --base-ref ${{ github.event.pull_request.base.sha }} \
          --schema tools/board_schema.json \
          --results-json /tmp/validation_results.json \
          ${{ steps.changed.outputs.files }}

    - name: Write validation summary
      if: always() && steps.changed.outputs.has_files == 'true'
      run: |
        if [ -f /tmp/validation_results.json ]; then
          python3 -c "
import json, sys

with open('/tmp/validation_results.json') as f:
    results = json.load(f)

errors = results['errors']
warnings = results['warnings']

if not errors and not warnings:
    sys.exit(0)

lines = ['## Board Validation Results\n']

for board in results['boards']:
    name = board['board_name']
    port = board['port']
    be = [e for e in errors if f'boards/{name}/' in e['file'] or e['file'].endswith(name)]
    bw = [w for w in warnings if f'boards/{name}/' in w['file'] or w['file'].endswith(name)]
    status = ':x:' if be else ':white_check_mark:'
    lines.append(f'### {status} {name} ({port}) — {len(be)} error(s), {len(bw)} warning(s)\n')
    if be or bw:
        lines.append('| Status | File | Details |')
        lines.append('|--------|------|---------|')
        for e in be:
            f = e['file'].split('/')[-1]
            lines.append(f'| :x: Error | \`{f}\` | {e[\"message\"]} |')
        for w in bw:
            f = w['file'].split('/')[-1]
            lines.append(f'| :warning: Warning | \`{f}\` | {w[\"message\"]} |')
        lines.append('')

import os
summary = '\n'.join(lines)

# Write to step summary (visible on the Actions run page and PR checks tab)
summary_path = os.environ.get('GITHUB_STEP_SUMMARY')
if summary_path:
    with open(summary_path, 'a') as f:
        f.write(summary)

# Also write for the PR comment step
with open('/tmp/validation_comment.md', 'w') as f:
    f.write(summary)
"
        fi

    - name: Comment on PR with validation results
      if: always() && steps.changed.outputs.has_files == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const commentPath = '/tmp/validation_comment.md';

          if (!fs.existsSync(commentPath)) {
            console.log('No validation comment to post.');
            return;
          }

          const content = fs.readFileSync(commentPath, 'utf8').trim();
          if (!content) {
            console.log('No issues to report.');
            return;
          }

          const marker = '<!-- board-validate-results -->';
          const body = marker + '\n' + content;

          const prNumber = context.payload.pull_request.number;

          // Delete any previous validation comment that may have been
          // overwritten by other bots (e.g. code size), then create fresh.
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
          });

          for (const c of comments) {
            if (c.body.includes(marker)) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: c.id,
              });
              console.log(`Deleted old validation comment (id: ${c.id})`);
            }
          }

          const response = await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            body: body,
          });
          console.log(`Created validation comment (id: ${response.data.id}, url: ${response.data.html_url})`);
