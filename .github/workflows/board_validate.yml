name: Validate new board definitions

on:
  pull_request:
    paths:
      - 'ports/*/boards/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-boards:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install uv
        uv pip install --system jsonschema

    - name: Get changed files
      id: changed
      run: |
        FILES=$(git diff --name-only \
          ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} \
          -- 'ports/*/boards/**' | tr '\n' ' ')
        echo "files=$FILES" >> "$GITHUB_OUTPUT"
        if [ -z "$FILES" ]; then
          echo "has_files=false" >> "$GITHUB_OUTPUT"
        else
          echo "has_files=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Validate new boards
      if: steps.changed.outputs.has_files == 'true'
      run: |
        python tools/validate_board.py \
          --repo-root . \
          --base-ref ${{ github.event.pull_request.base.sha }} \
          --schema tools/board_schema.json \
          --results-json /tmp/validation_results.json \
          ${{ steps.changed.outputs.files }}

    - name: Comment on PR with validation results
      if: always() && steps.changed.outputs.has_files == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const resultsPath = '/tmp/validation_results.json';

          if (!fs.existsSync(resultsPath)) {
            console.log('No validation results file found, skipping comment.');
            return;
          }

          const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
          const hasErrors = results.errors.length > 0;
          const hasWarnings = results.warnings.length > 0;
          if (!hasErrors && !hasWarnings) {
            console.log('No issues to report.');
            return;
          }

          // Build comment body
          let body = '## Board Validation Results\n\n';

          for (const board of results.boards) {
            const boardErrors = results.errors.filter(
              e => e.file.includes(`boards/${board.board_name}/`) || e.file.endsWith(board.board_name)
            );
            const boardWarnings = results.warnings.filter(
              w => w.file.includes(`boards/${board.board_name}/`) || w.file.endsWith(board.board_name)
            );

            const status = boardErrors.length > 0 ? ':x:' : ':white_check_mark:';
            body += `### ${status} ${board.board_name} (${board.port})`;
            body += ` — ${boardErrors.length} error(s), ${boardWarnings.length} warning(s)\n\n`;

            if (boardErrors.length > 0 || boardWarnings.length > 0) {
              body += '| Status | File | Details |\n';
              body += '|--------|------|---------|';
              for (const e of boardErrors) {
                const file = e.file.split('/').pop();
                body += `\n| :x: Error | \`${file}\` | ${e.message} |`;
              }
              for (const w of boardWarnings) {
                const file = w.file.split('/').pop();
                body += `\n| :warning: Warning | \`${file}\` | ${w.message} |`;
              }
              body += '\n\n';
            }
          }

          // Check for existing comment to avoid duplicates
          const marker = '<!-- board-validate-results -->';
          body = marker + '\n' + body;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c => c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: body,
            });
            console.log('Updated existing validation comment.');
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
            console.log('Created new validation comment.');
          }
