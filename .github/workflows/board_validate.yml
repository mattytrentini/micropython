name: Validate new board definitions

on:
  pull_request:
    paths:
      - 'ports/*/boards/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-boards:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install uv
        uv pip install --system jsonschema

    - name: Get changed files
      id: changed
      run: |
        FILES=$(git diff --name-only \
          ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} \
          -- 'ports/*/boards/**' | tr '\n' ' ')
        echo "files=$FILES" >> "$GITHUB_OUTPUT"
        if [ -z "$FILES" ]; then
          echo "has_files=false" >> "$GITHUB_OUTPUT"
        else
          echo "has_files=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Validate new boards
      if: steps.changed.outputs.has_files == 'true'
      run: |
        python tools/validate_board.py \
          --repo-root . \
          --base-ref ${{ github.event.pull_request.base.sha }} \
          --schema tools/board_schema.json \
          --results-json /tmp/validation_results.json \
          --comment-md /tmp/validation_comment.md \
          ${{ steps.changed.outputs.files }}

    - name: Post validation results as step summary
      if: always() && steps.changed.outputs.has_files == 'true'
      run: |
        if [ -f /tmp/validation_comment.md ]; then
          cat /tmp/validation_comment.md >> "$GITHUB_STEP_SUMMARY"
        fi
